baseURL = 'https://idbok.nbifrye.com/'
title = 'デジタルアイデンティティ Body of Knowledge'
languageCode = 'ja'
defaultContentLanguage = 'ja'
copyright = '本サイトのコンテンツはAIエージェントにより生成されています'

enableGitInfo = true
disablePathToLower = true

[module]
[[module.imports]]
path = 'github.com/alex-shpak/hugo-book'

[params]
BookTheme = 'auto'
BookSection = 'docs'
BookSearch = true
BookToC = true
BookRepo = 'https://github.com/nbifrye/idbok.nbifrye.com'
BookEditLink = 'https://github.com/nbifrye/idbok.nbifrye.com/edit/main/{{ .Path }}'
BookDateFormat = '2006年1月2日'
BookPortableLinks = 'warning'

[markup]
[markup.goldmark.renderer]
unsafe = true
[markup.tableOfContents]
startLevel = 2
endLevel = 4
[markup.highlight]
style = 'base16-snazzy'

[taxonomies]
tag = 'tags'
category = 'categories'
status = 'statuses'

[outputs]
home = ['HTML', 'RSS']

[sitemap]
changeFreq = 'weekly'
priority = 0.5
